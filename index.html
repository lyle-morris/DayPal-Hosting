<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DayPal Settings</title>
  <style>
    :root {
      --bg: #111111;
      --section: rgba(255, 255, 255, 0.25);
      --text: #ffffff;
      --muted: #d8d8d8;
      --field: #000000;
      --accent: #00AAFF;
      --success: #00ff88;
      --radius: 4px;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; max-width: 100%; overflow-x: hidden; }

    body {
      margin: 0;
      padding: 14px 14px 86px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.4;
    }

    h1 { margin: 0 0 4px; font-size: 28px; font-weight: 800; }
    .subtitle { margin: 0 0 20px; color: var(--muted); font-size: 14px; }

    .section {
      width: 100%;
      background: var(--section);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .section-title { margin: 0 0 4px; font-size: 18px; font-weight: 800; }
    .section-copy { margin: 0 0 16px; color: var(--muted); font-size: 14px; }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
    }

    .theme-tile {
      position: relative;
      width: 100%;
      min-width: 0;
      min-height: 48px;
      border: 0;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 6px;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.1;
      text-align: center;
      cursor: pointer;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .theme-tile.selected::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 170, 255, 0.88);
      color: #ffffff;
      border-radius: var(--radius);
      font-size: 24px;
      font-weight: 900;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .toggle-copy { color: var(--muted); font-size: 14px; }
    input[type="checkbox"] { flex: 0 0 auto; width: 32px; height: 32px; accent-color: var(--accent); }

    .slot-row {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      width: 100%;
    }

    .slot-row label { font-size: 14px; font-weight: 800; }

    select {
      width: 100%;
      min-width: 0;
      min-height: 44px;
      padding: 10px 12px;
      border: 0;
      border-radius: var(--radius);
      background: var(--field);
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
    }

    .secondary-button {
      width: 100%;
      height: 48px;
      margin-top: 12px;
      padding: 0 16px;
      border: 0;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.35);
      color: var(--text);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .actions {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      padding: 10px 14px 14px;
      background: var(--bg);
      box-shadow: 0 -8px 18px rgba(0, 0, 0, 0.35);
    }

    #status {
      min-height: 18px;
      margin: 0 0 6px;
      color: var(--success);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
    }

    #save {
      width: 100%;
      height: 48px;
      border: 0;
      border-radius: var(--radius);
      background: var(--accent);
      color: #ffffff;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    @media (max-width: 330px) {
      body { padding: 12px 12px 84px; }
      .section { padding: 14px; }
      .theme-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .slot-row { grid-template-columns: 56px minmax(0, 1fr); gap: 10px; }
      .theme-tile, select, #save, .secondary-button { font-size: 15px; }
    }
  </style>
</head>
<body>
  <h1>DayPal</h1>
  <p class="subtitle">Use the below settings to help customized your watchface.</p>

  <div class="section">
    <p class="section-title">Themes</p>
    <p class="section-copy">Select a color theme for your watchface.</p>
    <div class="theme-grid" id="themeTiles"></div>
  </div>

  <div class="section">
    <p class="section-title">Clock settings</p>
    <div class="toggle-row">
      <div class="toggle-copy">Display leading zero on the hours.</div>
      <input id="show_leading_zero" type="checkbox">
    </div>
  </div>

  <div class="section">
    <p class="section-title">Metric slots</p>
    <p class="section-copy">Customize which metric goes in which slot on the watchface.</p>
    <div class="slot-row"><label for="slot_1_metric">Slot 1</label><select id="slot_1_metric"></select></div>
    <div class="slot-row"><label for="slot_2_metric">Slot 2</label><select id="slot_2_metric"></select></div>
    <div class="slot-row"><label for="slot_3_metric">Slot 3</label><select id="slot_3_metric"></select></div>
    <div class="slot-row"><label for="slot_4_metric">Slot 4</label><select id="slot_4_metric"></select></div>
    <button id="reset_layout" class="secondary-button" type="button">Reset layout</button>
  </div>

  <div class="actions">
    <div id="status"></div>
    <button id="save" type="button">Save settings</button>
  </div>

  <script>
    var DEFAULT_SETTINGS = {
      theme: 0,
      slot_1_metric: 0,
      slot_2_metric: 1,
      slot_3_metric: 2,
      slot_4_metric: 4,
      show_leading_zero: true
    };

    var METRICS = [
      { value: 0, label: 'Weather' },
      { value: 1, label: 'Heart rate' },
      { value: 2, label: 'Battery' },
      { value: 3, label: 'Calories' },
      { value: 4, label: 'Steps' },
      { value: 5, label: 'None' }
    ];

    var THEMES = [
      { value: 0, label: 'Default', bg: '#000000', color: '#ffffff' },
      { value: 1, label: 'Blue', bg: '#0055FF', color: '#000000' },
      { value: 5, label: 'Orange', bg: '#FF5500', color: '#000000' },
      { value: 3, label: 'Green', bg: '#00AA55', color: '#000000' },
      { value: 2, label: 'Pink', bg: '#FF00AA', color: '#000000' },
      { value: 8, label: 'Red', bg: '#FF0055', color: '#000000' },
      { value: 9, label: 'Yellow', bg: '#FFCC55', color: '#000000' },
      { value: 7, label: 'Black', bg: '#000000', color: '#ffffff' },
      { value: 4, label: 'White', bg: '#FFFFFF', color: '#000000' },
      { value: 11, label: 'Gray', bg: '#AAAAAA', color: '#000000' }
    ];

    function mergeSettings(base, saved) {
      var result = {};
      var key;
      for (key in base) result[key] = base[key];
      if (saved) for (key in saved) result[key] = saved[key];
      return result;
    }

    function getQuerySettings() {
      var match = window.location.search.match(/[?&]settings=([^&]+)/);
      if (!match) return DEFAULT_SETTINGS;
      try {
        var parsed = JSON.parse(decodeURIComponent(match[1]));
        if (Number(parsed.theme) === 10) parsed.theme = 9;
        return mergeSettings(DEFAULT_SETTINGS, parsed);
      } catch (e) {
        return DEFAULT_SETTINGS;
      }
    }

    function populateMetricSelect(id) {
      var select = document.getElementById(id);
      for (var i = 0; i < METRICS.length; i++) {
        var metric = METRICS[i];
        var option = document.createElement('option');
        option.value = metric.value;
        option.textContent = metric.label;
        select.appendChild(option);
      }
    }

    function renderThemeTiles(settings) {
      var container = document.getElementById('themeTiles');
      container.innerHTML = '';
      for (var i = 0; i < THEMES.length; i++) {
        var theme = THEMES[i];
        var tile = document.createElement('button');
        tile.type = 'button';
        tile.className = 'theme-tile' + (Number(settings.theme) === theme.value ? ' selected' : '');
        tile.textContent = theme.label;
        tile.style.background = theme.bg;
        tile.style.color = theme.color;
        tile.setAttribute('data-theme', theme.value);
        tile.onclick = function() {
          settings.theme = Number(this.getAttribute('data-theme'));
          renderThemeTiles(settings);
        };
        container.appendChild(tile);
      }
    }

    function readSettingsFromForm() {
      return {
        theme: Number(settings.theme) === 10 ? 9 : Number(settings.theme),
        slot_1_metric: Number(document.getElementById('slot_1_metric').value),
        slot_2_metric: Number(document.getElementById('slot_2_metric').value),
        slot_3_metric: Number(document.getElementById('slot_3_metric').value),
        slot_4_metric: Number(document.getElementById('slot_4_metric').value),
        show_leading_zero: document.getElementById('show_leading_zero').checked
      };
    }

    function resetLayout() {
      document.getElementById('slot_1_metric').value = 0;
      document.getElementById('slot_2_metric').value = 1;
      document.getElementById('slot_3_metric').value = 2;
      document.getElementById('slot_4_metric').value = 4;
    }

    function saveAndClose() {
      var status = document.getElementById('status');
      var button = document.getElementById('save');
      var result = readSettingsFromForm();
      var encoded = encodeURIComponent(JSON.stringify(result));
      var closeUrl = 'pebblejs://close#' + encoded;

      status.textContent = 'Saving…';
      button.textContent = 'Saving…';
      button.disabled = true;

      setTimeout(function() { window.location.href = closeUrl; }, 50);
      setTimeout(function() { document.location = closeUrl; }, 150);
      setTimeout(function() {
        status.textContent = 'Saved. If this window stays open in CloudPebble, close it and rerun the emulator.';
        button.textContent = 'Save settings';
        button.disabled = false;
      }, 800);
    }

    populateMetricSelect('slot_1_metric');
    populateMetricSelect('slot_2_metric');
    populateMetricSelect('slot_3_metric');
    populateMetricSelect('slot_4_metric');

    var settings = getQuerySettings();
    renderThemeTiles(settings);
    document.getElementById('slot_1_metric').value = Number(settings.slot_1_metric);
    document.getElementById('slot_2_metric').value = Number(settings.slot_2_metric);
    document.getElementById('slot_3_metric').value = Number(settings.slot_3_metric);
    document.getElementById('slot_4_metric').value = Number(settings.slot_4_metric);
    document.getElementById('show_leading_zero').checked = !!settings.show_leading_zero;
    document.getElementById('reset_layout').onclick = resetLayout;
    document.getElementById('save').onclick = saveAndClose;
  </script>
</body>
</html>
